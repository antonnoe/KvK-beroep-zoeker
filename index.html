<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checklist Ondernemen Frankrijk – Instanties & Contact</title>
<meta name="description" content="Vind direct de juiste Franse instanties en contactgegevens voor uw bedrijf in Frankrijk. Check per beroep en postcode.">

<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
/* --- BASIS OPMAAK --- */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Mulish', sans-serif;
  background-color: #f9f9f9;
  color: #333;
  line-height: 1.6em;
}

main {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

/* --- TYPOGRAFIE & KLEUREN --- */
h1, h2, h3 {
  font-family: 'Poppins', sans-serif;
  color: #800000; /* Kastanjebruin */
  margin-top: 0;
}

h1 { font-size: 26px; margin-bottom: 10px; }
h2 { font-size: 20px; }

a { text-decoration: none; transition: 0.2s; }

/* --- CONTAINERS --- */
.card {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  overflow: hidden;
  margin-bottom: 30px;
  border: 1px solid #eee;
}

.header-bg {
  background-color: #800000;
  color: #fff;
  padding: 25px;
  text-align: center;
}
.header-bg h2 { color: #fff; margin: 0; }
.header-bg p { color: rgba(255,255,255,0.9); margin: 5px 0 0; font-size: 14px; }

.content { padding: 30px; }

/* --- FORMULIER --- */
label {
  display: block;
  font-weight: 700;
  margin-bottom: 8px;
  color: #800000;
  font-family: 'Poppins', sans-serif;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-family: 'Mulish', sans-serif;
  font-size: 16px;
  background: #fff;
}

button.main-btn {
  display: block;
  width: 100%;
  background-color: #800000;
  color: #fff;
  border: none;
  padding: 16px;
  font-size: 16px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.2s;
}
button.main-btn:hover { opacity: 0.9; }

/* --- MELDINGEN --- */
#msg-error {
  display: none;
  background-color: #ffebeb;
  color: #c00;
  padding: 15px;
  margin-top: 20px;
  border-radius: 6px;
  border-left: 5px solid #c00;
}

/* --- RESULTATEN --- */
#results-area {
  display: none;
  background-color: #fffcf0; /* Zacht geel accent */
  border-top: 1px solid #eaddb6;
  padding: 30px;
}

.res-header {
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid #eaddb6;
}

.res-block {
  background: #fff;
  border: 1px solid #eaddb6;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 6px;
  border-left: 4px solid #800000;
}

/* Knop voor contactgegevens */
.contact-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background-color: #f4f4f4;
  color: #333;
  font-size: 13px;
  font-weight: 700;
  border-radius: 4px;
  border: 1px solid #ddd;
}
.contact-btn:hover {
  background-color: #800000;
  color: #fff;
  border-color: #800000;
}

.tip-box {
  background: #fff;
  padding: 15px;
  border-radius: 6px;
  font-size: 14px;
  color: #555;
  margin-top: 20px;
  border: 1px dashed #999;
}

.guichet-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: #800000; 
  font-weight: bold;
}
</style>
</head>
<body>

<main>
  <div style="margin-bottom: 30px; text-align: center;">
    <h1>Starten in Frankrijk</h1>
    <p style="font-size: 18px; color: #555;">
      Vind de lokale contactgegevens en verplichtingen voor uw bedrijf.
    </p>
  </div>

  <div class="card">
    <div class="header-bg">
      <h2>Ondernemersloket Vinder</h2>
      <p>Zoek op postcode & activiteit</p>
    </div>

    <div class="content">
      <div style="margin-bottom: 10px;">
        <label for="inp-pc">Postcode (Frankrijk)</label>
        <input type="text" id="inp-pc" placeholder="Bijv. 62100" maxlength="5" inputmode="numeric">
      </div>

      <div style="margin-bottom: 10px;">
        <label for="inp-job">Hoofdactiviteit</label>
        <select id="inp-job">
          <option value="">-- Maak een keuze --</option>
          
          <optgroup label="Bouw & Ambacht">
            <option value="bouw_alg">Algemeen (Timmerman, Schilder, Metselaar)</option>
            <option value="loodgieter">Loodgieter / Installateur</option>
            <option value="elektricien">Elektricien</option>
          </optgroup>

          <optgroup label="Horeca & Toerisme">
            <option value="restaurant">Restaurant / Café</option>
            <option value="foodtruck">Foodtruck / Markt</option>
            <option value="gite">Gîte (Vakantieverhuur)</option>
            <option value="chambre">Chambre d'Hôtes (B&B)</option>
          </optgroup>

          <optgroup label="Diensten">
            <option value="consultant">Consultant / Coach / Tekstschrijver</option>
            <option value="web_it">IT / Webdesign</option>
            <option value="makelaar">Makelaar (Agent Immobilier)</option>
            <option value="schoonmaak">Schoonmaakbedrijf</option>
          </optgroup>
        </select>
      </div>

      <button type="button" id="btn-search" class="main-btn">Zoek Contactgegevens</button>
      <div id="msg-error"></div>
    </div>

    <div id="results-area">
      <div class="res-header">
        <strong>Locatie:</strong> <span id="res-city" style="color:#800000;">...</span><br>
        <span style="font-size:14px; color:#666;">(Resultaten voor departement: <span id="res-dept-nr"></span>)</span>
      </div>

      <h3 style="font-size:18px;">Uw Lokale Instanties:</h3>
      <div id="res-list"></div>

      <div id="res-tips" class="tip-box" style="display:none;"></div>
      
      <div style="margin-top:20px; text-align:center;">
        <a href="https://formalites.entreprises.gouv.fr/" target="_blank" class="guichet-link">
           Naar Guichet Unique (INPI) &rarr;
        </a>
        <div style="font-size:12px; margin-top:5px; color:#888;">Het officiële nationale registratieportaal.</div>
      </div>
    </div>
  </div>
</main>

<script>
(function() {
  // --- CONFIGURATIE ---
  
  // Data: Instanties + Zoektermen voor Google Maps
  var INST = {
    CMA: { 
      n: "CMA (Chambre de Métiers)", 
      t: "Ambachtskamer. Verplicht voor handwerk en ambacht.",
      q: "Chambre de Métiers et de l'Artisanat" 
    },
    CCI: { 
      n: "CCI (Kamer van Koophandel)", 
      t: "Voor handelsactiviteiten en verkoop.",
      q: "Chambre de Commerce et d'Industrie"
    },
    URSSAF: { 
      n: "URSSAF", 
      t: "Voor de inning van sociale lasten (Vrije beroepen).",
      q: "URSSAF"
    },
    MAIRIE: { 
      n: "Mairie (Gemeentehuis)", 
      t: "Ga langs bij de lokale gemeente voor vergunningen.",
      q: "Mairie" // Zoekt specifiek op stad
    },
    GRIFF: { 
      n: "Greffe du Tribunal", 
      t: "Handelsregister (via Guichet Unique).",
      q: "Greffe du Tribunal de Commerce"
    },
    PREF: { 
      n: "Préfecture", 
      t: "Voor specifieke beroepskaarten of vergunningen.",
      q: "Préfecture"
    }
  };

  // Data: Regels & Tips per beroep
  var RULES = {
    bouw_alg: {
      inst: ["CMA", "GRIFF"],
      tip: "<strong>Let op:</strong> De 10-jarige verzekering (Garantie Décennale) is wettelijk verplicht vóór de start. Vraag ook naar de 'Carte BTP'."
    },
    loodgieter: {
      inst: ["CMA", "GRIFF"],
      tip: "<strong>Vereiste:</strong> Vakdiploma (CAP/BEP) of 3 jaar ervaring is verplicht + Garantie Décennale."
    },
    elektricien: {
      inst: ["CMA", "GRIFF"],
      tip: "<strong>Vereiste:</strong> Vakdiploma verplicht. Installaties moeten gekeurd worden door de CONSUEL."
    },
    restaurant: {
      inst: ["CCI", "MAIRIE", "GRIFF"],
      tip: "<strong>Training:</strong> 'Permis d’Exploitation' (drankvergunning) en HACCP (hygiëne) verplicht."
    },
    foodtruck: {
      inst: ["CCI", "MAIRIE", "CMA"],
      tip: "<strong>Standplaats:</strong> Vraag bij de Mairie een vergunning voor openbare weggebruik."
    },
    gite: {
      inst: ["MAIRIE", "GRIFF"],
      tip: "Meld de gîte aan bij de gemeente (Cerfa formulier). Classificatie aanvragen kan belastingvoordeel geven."
    },
    chambre: {
      inst: ["MAIRIE", "CCI"],
      tip: "Max. 5 kamers en 15 personen. Ontbijt serveren is verplicht."
    },
    consultant: {
      inst: ["URSSAF"],
      tip: "U valt meestal onder de 'Profession Libérale' (BNC). Eenvoudige administratie via URSSAF."
    },
    web_it: {
      inst: ["URSSAF"],
      tip: "Verkoop van diensten (Prestation de Service). Hardware verkoop vereist ook CCI."
    },
    makelaar: {
      inst: ["CCI", "PREF"],
      tip: "<strong>Strenge eisen:</strong> 'Carte Professionnelle' (Carte T) nodig via CCI/Préfecture."
    },
    schoonmaak: {
      inst: ["CMA", "GRIFF"],
      tip: "Voor algemene schoonmaak is vaak geen diploma vereist."
    }
  };

  // --- ELEMENTEN ---
  var btn = document.getElementById('btn-search');
  var inpPc = document.getElementById('inp-pc');
  var inpJob = document.getElementById('inp-job');
  var errBox = document.getElementById('msg-error');
  var resArea = document.getElementById('results-area');
  var resCity = document.getElementById('res-city');
  var resDeptNr = document.getElementById('res-dept-nr');
  var resList = document.getElementById('res-list');
  var resTips = document.getElementById('res-tips');

  // --- LOGICA ---
  btn.addEventListener('click', function() {
    errBox.style.display = 'none';
    resArea.style.display = 'none';
    resTips.style.display = 'none';
    btn.innerHTML = 'GEGEVENS OPHALEN...';
    btn.style.opacity = '0.7';

    var pc = inpPc.value.trim();
    var jobKey = inpJob.value;

    if (!/^\d{5}$/.test(pc)) {
      showError("Voer een geldige Franse postcode in (5 cijfers).");
      return;
    }
    if (jobKey === "") {
      showError("Kies een beroepsgroep.");
      return;
    }

    // API Call
    fetch('https://geo.api.gouv.fr/communes?codePostal=' + pc + '&fields=nom,codeDepartement')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data || data.length === 0) {
          throw new Error("Postcode onbekend");
        }

        var stadNaam = data[0].nom;
        var deptCode = data[0].codeDepartement;
        
        if (data.length > 1) {
          stadNaam = data[0].nom + " (en omliggende)";
        }

        toonResultaat(stadNaam, deptCode, jobKey);
      })
      .catch(function(e) {
        showError("Locatie niet gevonden. Controleer de postcode.");
        console.error(e);
        resetBtn();
      });
  });

  function toonResultaat(stad, dept, jobKey) {
    resCity.textContent = stad;
    resDeptNr.textContent = dept;

    var ruleSet = RULES[jobKey];
    var html = "";

    if (ruleSet && ruleSet.inst) {
      ruleSet.inst.forEach(function(code) {
        var info = INST[code];
        if (info) {
          // Bouw zoekterm: "CCI department 62" of "Mairie [Stad]"
          var zoekLocatie = (code === 'MAIRIE') ? stad : ("departement " + dept);
          var mapsQuery = encodeURIComponent(info.q + " " + zoekLocatie);
          var mapsLink = "https://www.google.fr/maps/search/" + mapsQuery;

          html += '<div class="res-block">';
          html += '<strong style="color:#800000; font-size:16px;">' + info.n + '</strong>';
          html += '<div style="margin-top:5px; margin-bottom:10px; color:#444;">' + info.t + '</div>';
          
          // Knop naar Maps/Adres
          html += '<a href="' + mapsLink + '" target="_blank" class="contact-btn">';
          html += '📍 Vind adres & telefoonnummer';
          html += '</a>';
          
          html += '</div>';
        }
      });
    }
    resList.innerHTML = html;

    if (ruleSet && ruleSet.tip) {
      resTips.innerHTML = "💡 " + ruleSet.tip;
      resTips.style.display = 'block';
    }

    resArea.style.display = 'block';
    resetBtn();
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.style.display = 'block';
    resetBtn();
  }

  function resetBtn() {
    btn.innerHTML = 'ZOEK CONTACTGEGEVENS';
    btn.style.opacity = '1';
  }

})();
</script>

</body>
</html>
