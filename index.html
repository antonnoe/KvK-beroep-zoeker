<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beroepenchecker Frankrijk – Check Eisen & Instanties</title>
<meta name="description" content="Check of uw beroep gereguleerd is in Frankrijk. Vind direct de juiste instanties en diploma-eisen per activiteit.">

<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
/* --- BASIS OPMAAK --- */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Mulish', sans-serif;
  background-color: #f9f9f9;
  color: #333;
  line-height: 1.8em; /* Ruime regelafstand conform instructie */
}

main {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

/* --- TYPOGRAFIE & KLEUREN --- */
h1, h2, h3 {
  font-family: 'Poppins', sans-serif;
  color: #800000; /* Kastanjebruin */
  margin-top: 0;
}

h1 { font-size: 28px; margin-bottom: 15px; }
h2 { font-size: 22px; }
h3 { font-size: 18px; margin-bottom: 10px; }

a { text-decoration: none; transition: 0.2s; }

/* --- CONTAINERS --- */
.card {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  overflow: hidden;
  margin-bottom: 30px;
  border: 1px solid #eee;
}

.header-bg {
  background-color: #800000;
  color: #fff;
  padding: 30px;
  text-align: center;
}
.header-bg h2 { color: #fff; margin: 0; }
.header-bg p { color: rgba(255,255,255,0.9); margin: 10px 0 0; font-size: 15px; }

.content { padding: 30px; }

/* --- FORMULIER --- */
label {
  display: block;
  font-weight: 700;
  margin-bottom: 8px;
  color: #800000;
  font-family: 'Poppins', sans-serif;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 25px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-family: 'Mulish', sans-serif;
  font-size: 16px;
  background: #fff;
}

button.main-btn {
  display: block;
  width: 100%;
  background-color: #800000;
  color: #fff;
  border: none;
  padding: 18px;
  font-size: 16px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.2s, background 0.2s;
}
button.main-btn:hover { opacity: 0.9; }

/* --- MELDINGEN --- */
#msg-error {
  display: none;
  background-color: #ffebeb;
  color: #c00;
  padding: 15px;
  margin-top: 20px;
  border-radius: 6px;
  border-left: 5px solid #c00;
}

/* --- RESULTATEN --- */
#results-area {
  display: none;
  background-color: #fffcf0; /* Zacht geel accent */
  border-top: 1px solid #eaddb6;
  padding: 30px;
}

.res-header {
  margin-bottom: 25px;
  padding-bottom: 15px;
  border-bottom: 1px solid #eaddb6;
}

.res-block {
  background: #fff;
  border: 1px solid #eaddb6;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 6px;
  border-left: 4px solid #800000;
}

/* Knop voor contactgegevens */
.contact-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 10px 15px;
  background-color: #f4f4f4;
  color: #333;
  font-size: 14px;
  font-weight: 700;
  border-radius: 4px;
  border: 1px solid #ddd;
}
.contact-btn:hover {
  background-color: #800000;
  color: #fff;
  border-color: #800000;
}

.tip-box {
  background: #fff;
  padding: 20px;
  border-radius: 6px;
  font-size: 15px;
  color: #444;
  margin-top: 25px;
  border: 1px dashed #800000;
  line-height: 1.6em;
}

/* CTA Onderaan (Guichet) */
.cta-bottom-container {
  margin-top: 30px; 
  text-align: center;
  padding-top: 20px;
  border-top: 1px solid #eaddb6;
}

.guichet-link {
  background-color: #800000;
  color: #ffffff;
  padding: 15px 25px;
  text-decoration: none;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 1.1em;
  border-radius: 5px;
  display: inline-block;
  transition: background 0.3s ease;
}
.guichet-link:hover {
  background-color: #600000;
}

.sub-text {
  font-size: 0.9em;
  margin-top: 10px;
  color: #666;
}
</style>
</head>
<body>

<main>
  <div style="margin-bottom: 30px; text-align: center;">
    <h1>Beroepenchecker Frankrijk</h1>
    <p style="font-size: 18px; color: #555;">
      Selecteer uw beroep en ontdek direct de verplichtingen en lokale instanties.
    </p>
  </div>

  <div class="card">
    <div class="header-bg">
      <h2>Check Eisen & Contactgegevens</h2>
      <p>Zoek op postcode & activiteit</p>
    </div>

    <div class="content">
      <div style="margin-bottom: 10px;">
        <label for="inp-pc">Postcode (Frankrijk)</label>
        <input type="text" id="inp-pc" placeholder="Bijv. 24000" maxlength="5" inputmode="numeric">
      </div>

      <div style="margin-bottom: 10px;">
        <label for="inp-job">Ik wil werken als...</label>
        <select id="inp-job">
          <option value="">-- Maak een keuze --</option>
          
          <optgroup label="Horeca & Voeding">
            <option value="bediening">Bediening / Ober</option>
            <option value="kok">Kok (Cuisinier)</option>
            <option value="wijnboer">Wijnboer / Vigneron</option>
          </optgroup>

          <optgroup label="Toerisme & Verblijf">
            <option value="gite">Gîte-eigenaar</option>
            <option value="camping">Camping beheerder</option>
          </optgroup>

          <optgroup label="Bouw & Techniek">
            <option value="elektricien">Elektricien</option>
            <option value="loodgieter">Loodgieter</option>
            <option value="timmerman">Timmerman (Charpentier/Menuisier)</option>
            <option value="schilder">Schilder</option>
            <option value="metselaar">Metselaar (Maçon)</option>
            <option value="tegelzetter">Tegelzetter (Carreleur)</option>
            <option value="architect">Architect</option>
            <option value="interieur">Interieurontwerper</option>
          </optgroup>

          <optgroup label="Groen & Agrarisch">
            <option value="hovenier">Hovenier / Tuinman</option>
            <option value="groente">Groenteteler / Maraîcher</option>
            <option value="imker">Imker (Apiculteur)</option>
            <option value="boom">Boomverzorger</option>
            <option value="dierenpension">Dierenpensionhouder</option>
          </optgroup>

          <optgroup label="Zorg & Paramedisch">
            <option value="verpleeg">Verpleegkundige</option>
            <option value="fysio">Fysiotherapeut</option>
            <option value="psych">Psycholoog</option>
            <option value="thuiszorg">Thuiszorg / Auxiliaire de vie</option>
            <option value="osteo">Osteopaat</option>
            <option value="pedicure">Pedicure-Podologue</option>
          </optgroup>

          <optgroup label="Artsen & Specialisten">
            <option value="arts">Huisarts</option>
            <option value="tandarts">Tandarts</option>
            <option value="dierenarts">Dierenarts</option>
          </optgroup>

          <optgroup label="Dienstverlening">
            <option value="admin">Administratief assistent / VA</option>
            <option value="coach">Coach / Consultant</option>
            <option value="klus">Klusjesman (Multi-service)</option>
            <option value="makelaar">Makelaar (Agent Immobilier)</option>
            <option value="vertaler">Vertaler</option>
            <option value="leraar">Leraar privé / Bijles</option>
          </optgroup>

          <optgroup label="Juridisch & Financieel">
            <option value="advocaat">Advocaat</option>
            <option value="accountant">Accountant (Expert-Comptable)</option>
          </optgroup>

          <optgroup label="IT, Web & Digitaal">
            <option value="web">Webdeveloper</option>
            <option value="grafisch">Grafisch ontwerper</option>
          </optgroup>

          <optgroup label="Transport & Logistiek">
            <option value="taxi">Taxichauffeur</option>
            <option value="vtc">VTC chauffeur (Privé chauffeur)</option>
          </optgroup>

          <optgroup label="Kunst & Creatief">
            <option value="fotograaf">Fotograaf</option>
            <option value="keramist">Keramist / Pottenbakker</option>
            <option value="schrijver">Schrijver / Auteur</option>
          </optgroup>

          <optgroup label="Uiterlijke verzorging">
            <option value="schoonheid">Schoonheidsspecialiste</option>
            <option value="kapper">Kapper / Kapster</option>
          </optgroup>
        </select>
      </div>

      <button type="button" id="btn-search" class="main-btn">Check Eisen & Contact</button>
      <div id="msg-error"></div>
    </div>

    <div id="results-area">
      <div class="res-header">
        <strong>Locatie:</strong> <span id="res-city" style="color:#800000; font-weight:700;">...</span><br>
        <span style="font-size:14px; color:#666;">(Departement: <span id="res-dept-nr"></span>)</span>
      </div>

      <h3>Betrokken Instanties:</h3>
      <div id="res-list"></div>

      <div id="res-tips" class="tip-box" style="display:none;"></div>
      
      <div class="cta-bottom-container">
        <a href="https://formalites.entreprises.gouv.fr/" target="_blank" class="guichet-link">
            Naar Guichet Unique (INPI) &rarr;
        </a>
        <div class="sub-text">Het officiële nationale registratieportaal.</div>
      </div>

    </div>
  </div>
</main>

<script>
(function() {
  // --- CONFIGURATIE ---
  
  // Data: Instanties + Zoektermen voor Google Maps
  var INST = {
    CMA: { 
      n: "CMA (Chambre de Métiers)", 
      t: "Verplicht voor ambachtelijke beroepen. Beheert het RM-register.",
      q: "Chambre de Métiers et de l'Artisanat" 
    },
    CCI: { 
      n: "CCI (Kamer van Koophandel)", 
      t: "Voor handelsactiviteiten, verkoop en commerciële diensten.",
      q: "Chambre de Commerce et d'Industrie"
    },
    URSSAF: { 
      n: "URSSAF (Cfe)", 
      t: "Centrum voor vrije beroepen (professions libérales).",
      q: "URSSAF"
    },
    CA: {
      n: "Chambre d'Agriculture",
      t: "Voor alle agrarische activiteiten en aanverwante beroepen.",
      q: "Chambre d'Agriculture"
    },
    MAIRIE: { 
      n: "Mairie (Gemeentehuis)", 
      t: "Voor lokale vergunningen, schenkrechten of toeristenbelasting.",
      q: "Mairie"
    },
    GRIFF: { 
      n: "Greffe du Tribunal", 
      t: "Handelsregister (RCS).",
      q: "Greffe du Tribunal de Commerce"
    },
    PREF: { 
      n: "Préfecture", 
      t: "Voor specifieke beroepskaarten (taxi, makelaar, etc.).",
      q: "Préfecture"
    },
    ARS: {
        n: "ARS / CPAM",
        t: "Zorginstanties voor registratie medische beroepen (ADELI/RPPS).",
        q: "CPAM"
    }
  };

  // Data: Regels & Tips per beroep (61 stuks)
  var RULES = {
    // HORECA
    bediening: { inst: ["CCI", "URSSAF"], tip: "Als freelancer in de bediening werkt u als dienstverlener (Prestation de Service)." },
    kok: { inst: ["CMA"], tip: "Als zelfstandig kok die gerechten bereidt, is dit een ambacht (Artisan). HACCP diploma verplicht." },
    wijnboer: { inst: ["CA"], tip: "Dit is een puur agrarische activiteit. Registratie verloopt via de Landbouwkamer." },
    
    // TOERISME
    gite: { inst: ["MAIRIE", "GRIFF"], tip: "Meld de gîte altijd aan bij de gemeente (Cerfa formulier). Classificatie is optioneel maar fiscaal voordelig." },
    camping: { inst: ["CCI", "MAIRIE"], tip: "Strenge regels m.b.t. veiligheid, ERP-normen en bestemmingsplannen." },
    
    // BOUW (Artisanat - Diploma verplicht)
    elektricien: { inst: ["CMA"], tip: "<strong>Streng gereguleerd:</strong> Vakdiploma verplicht. Installaties moeten gekeurd worden door CONSUEL." },
    loodgieter: { inst: ["CMA"], tip: "<strong>Let op:</strong> Vakdiploma (CAP/BEP) of 3 jaar aantoonbare ervaring verplicht + Garantie Décennale." },
    timmerman: { inst: ["CMA"], tip: "Ambachtelijk beroep. Garantie Décennale (10-jaren verzekering) is verplicht." },
    schilder: { inst: ["CMA"], tip: "Garantie Décennale is vaak verplicht, ook voor schilderwerk. Inschrijving bij CMA." },
    metselaar: { inst: ["CMA"], tip: "<strong>Let op:</strong> Zwaar gereguleerd. Diploma en verzekering zijn cruciaal." },
    tegelzetter: { inst: ["CMA"], tip: "Valt onder afbouw. Verzekeringsplicht geldt ook hier." },
    architect: { inst: ["URSSAF"], tip: "Beschermd beroep. Inschrijving bij 'Ordre des Architectes' is verplicht." },
    interieur: { inst: ["CMA", "URSSAF"], tip: "Als u structurele muren wijzigt: Architect nodig. Alleen decoratie: Vrij beroep of ambacht." },
    
    // GROEN
    hovenier: { inst: ["CA", "URSSAF"], tip: "Onderhoud (Service à la personne) gaat via URSSAF. Aanleg (Création) via MSA/Agri." },
    groente: { inst: ["CA"], tip: "Agrarische activiteit (MSA). Let op grondrechten." },
    imker: { inst: ["CA"], tip: "Bij verkoop van honing bent u agrarisch ondernemer. Aangifte aantal korven verplicht." },
    boom: { inst: ["CA"], tip: "Boomverzorging valt vaak onder de agrarische sector (MSA)." },
    dierenpension: { inst: ["CCI", "PREF"], tip: "Certificaat ACACED (kennis huisdieren) is verplicht, evenals inspectie DDPP." },
    
    // ZORG
    verpleeg: { inst: ["ARS", "URSSAF"], tip: "Diploma moet erkend worden in Frankrijk. Registratie in ADELI/RPPS register." },
    fysio: { inst: ["ARS", "URSSAF"], tip: "Erkenning diploma via 'Ordre des Masseurs-Kinésithérapeutes' verplicht." },
    psych: { inst: ["URSSAF", "ARS"], tip: "Titel is beschermd. Diploma moet geregistreerd worden bij ARS." },
    thuiszorg: { inst: ["URSSAF", "CMA"], tip: "Medische zorg alleen door verplegers. Huishoudelijke hulp is 'Service à la personne'." },
    osteo: { inst: ["URSSAF", "ARS"], tip: "Gebruik van de titel is gereguleerd (erkend diploma nodig)." },
    pedicure: { inst: ["CMA", "URSSAF"], tip: "Medisch pedicure vereist diploma. Cosmetisch valt onder schoonheidsspecialiste." },
    
    // ARTSEN
    arts: { inst: ["ARS", "URSSAF"], tip: "Inschrijving bij 'Ordre des Médecins' strikt noodzakelijk." },
    tandarts: { inst: ["ARS", "URSSAF"], tip: "Inschrijving bij 'Ordre des Chirurgiens-Dentistes' verplicht." },
    dierenarts: { inst: ["ARS", "URSSAF"], tip: "Inschrijving bij 'Ordre des Vétérinaires'. Ook agrarische aspecten." },
    
    // DIENSTEN
    admin: { inst: ["URSSAF"], tip: "Vrij beroep (Profession Libérale). Eenvoudige start via Auto-Entrepreneur." },
    coach: { inst: ["URSSAF"], tip: "Vrij beroep. Geen specifiek diploma vereist, wel aan te raden." },
    klus: { inst: ["CMA"], tip: " 'Homme toutes mains' mag alleen kleine klusjes doen (geen bouw/elektra!)." },
    makelaar: { inst: ["CCI", "PREF"], tip: "<strong>Let op:</strong> Carte Professionnelle (Carte T) verplicht. Zonder kaart alleen werken als 'agent commercial'." },
    vertaler: { inst: ["URSSAF"], tip: "Intellectueel vrij beroep. Geen diploma-eisen voor vestiging." },
    leraar: { inst: ["URSSAF"], tip: "Bijles geven is een vrij beroep. Controleer 'Service à la personne' voordelen." },
    
    // JURIDISCH
    advocaat: { inst: ["URSSAF"], tip: "Toelating tot de Franse balie (Barreau) is vereist." },
    accountant: { inst: ["URSSAF"], tip: "Expert-comptable is een beschermd beroep. Inschrijving bij de Orde verplicht." },
    
    // IT
    web: { inst: ["URSSAF", "CMA"], tip: "Puur coderen is vrij beroep. Grafisch/Design kan onder CMA vallen." },
    grafisch: { inst: ["CMA", "URSSAF"], tip: "Kan ambachtelijk zijn (CMA) of artistiek (Maison des Artistes - ander regime)." },
    
    // TRANSPORT
    taxi: { inst: ["CMA", "PREF"], tip: "Speciale vergunning (ADS) en beroepskaart nodig via de Préfecture." },
    vtc: { inst: ["CMA", "PREF"], tip: "VTC-examen en registratie in het VTC-register verplicht." },
    
    // KUNST
    fotograaf: { inst: ["CMA", "URSSAF"], tip: "Bruidsfotografie is ambacht (CMA). Kunstfotografie is artistiek." },
    keramist: { inst: ["CMA"], tip: "Ambachtelijk beroep (Métier d'Art). Inschrijving CMA." },
    schrijver: { inst: ["URSSAF"], tip: "Auteursrechten vallen vaak onder een specifiek artiesten-regime." },
    
    // BEAUTY
    schoonheid: { inst: ["CMA"], tip: "<strong>Gereguleerd:</strong> Diploma (CAP/BP) verplicht voor alle huidbehandelingen." },
    kapper: { inst: ["CMA"], tip: "<strong>Gereguleerd:</strong> Diploma (BP) verplicht om een salon te openen. Thuiskapper: CAP." }
  };

  // --- ELEMENTEN ---
  var btn = document.getElementById('btn-search');
  var inpPc = document.getElementById('inp-pc');
  var inpJob = document.getElementById('inp-job');
  var errBox = document.getElementById('msg-error');
  var resArea = document.getElementById('results-area');
  var resCity = document.getElementById('res-city');
  var resDeptNr = document.getElementById('res-dept-nr');
  var resList = document.getElementById('res-list');
  var resTips = document.getElementById('res-tips');

  // --- LOGICA ---
  btn.addEventListener('click', function() {
    errBox.style.display = 'none';
    resArea.style.display = 'none';
    resTips.style.display = 'none';
    btn.innerHTML = 'GEGEVENS ZOEKEN...';
    btn.style.opacity = '0.7';

    var pc = inpPc.value.trim();
    var jobKey = inpJob.value;

    if (!/^\d{5}$/.test(pc)) {
      showError("Voer een geldige Franse postcode in (5 cijfers).");
      return;
    }
    if (jobKey === "") {
      showError("Kies een beroep uit de lijst.");
      return;
    }

    // API Call (Geo API Gouv)
    fetch('https://geo.api.gouv.fr/communes?codePostal=' + pc + '&fields=nom,codeDepartement')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data || data.length === 0) {
          throw new Error("Postcode onbekend");
        }

        var stadNaam = data[0].nom;
        var deptCode = data[0].codeDepartement;
        
        if (data.length > 1) {
          stadNaam = data[0].nom + " (en omgeving)";
        }

        toonResultaat(stadNaam, deptCode, jobKey);
      })
      .catch(function(e) {
        showError("Locatie niet gevonden. Controleer de postcode.");
        console.error(e);
        resetBtn();
      });
  });

  function toonResultaat(stad, dept, jobKey) {
    resCity.textContent = stad;
    resDeptNr.textContent = dept;

    var ruleSet = RULES[jobKey];
    var html = "";

    if (ruleSet && ruleSet.inst) {
      ruleSet.inst.forEach(function(code) {
        var info = INST[code];
        if (info) {
          // Zoekterm logica
          var zoekLocatie = stad;
          if (code === 'CMA' || code === 'CCI' || code === 'CA' || code === 'PREF' || code === 'ARS') {
             zoekLocatie = "departement " + dept;
          }
          
          var mapsQuery = encodeURIComponent(info.q + " " + zoekLocatie);
          var mapsLink = "https://www.google.fr/maps/search/" + mapsQuery;

          html += '<div class="res-block">';
          html += '<strong style="color:#800000; font-size:16px;">' + info.n + '</strong>';
          html += '<div style="margin-top:5px; margin-bottom:10px; color:#444; font-size:0.95em;">' + info.t + '</div>';
          
          html += '<a href="' + mapsLink + '" target="_blank" class="contact-btn">';
          html += '📍 Vind adres & telefoonnummer';
          html += '</a>';
          
          html += '</div>';
        }
      });
    }
    resList.innerHTML = html;

    if (ruleSet && ruleSet.tip) {
      resTips.innerHTML = "💡 " + ruleSet.tip;
      resTips.style.display = 'block';
    }

    resArea.style.display = 'block';
    resetBtn();
    
    // Smooth scroll
    resArea.scrollIntoView({ behavior: 'smooth' });
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.style.display = 'block';
    resetBtn();
  }

  function resetBtn() {
    btn.innerHTML = 'Check Eisen & Contact';
    btn.style.opacity = '1';
  }

})();
</script>

</body>
</html>
